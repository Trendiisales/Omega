# ==============================================================================
# LATENCY EDGE ENGINES — Co-location Speed Advantage (0.3-4ms RTT)
# Three engines running independently from GoldEngineStack and CRTP engines.
#
# GoldSilverLeadLag:
#   Gold moves $0.50 in 10 ticks → arm signal → next XAGUSD tick fires entry
#   if silver hasn't moved $0.008 yet. TP=$0.25 SL=$0.10 Hold=90s Cooldown=30s
#
# GoldSpreadDislocation:
#   Gold spread widens to 2.5x median → fade the spike direction
#   TP=$0.30 SL=$0.15 Hold=30s Cooldown=15s (London/NY sessions only)
#
# GoldEventCompression:
#   Pre-event tight range ($0.40) detected → enter at $0.15 trigger (vs $0.35 normal)
#   Events: Tue/Thu/Fri 12:30 UTC, Wed 18:00 UTC
#   TP=$3.00 SL=$0.80 Hold=300s Cooldown=600s
#
# CompressionBreakout trigger tightened: $0.35 → $0.20 (co-location edge)
# ==============================================================================
[latency_edge]
enabled=true
lead_lag_gold_signal_move=0.50     # $ gold move in 10 ticks to arm signal
lead_lag_silver_tp=0.25            # $ silver target
lead_lag_silver_sl=0.10            # $ silver stop
lead_lag_signal_expiry_ms=800      # ms before armed signal expires
lead_lag_cooldown_sec=30           # min gap between lead-lag entries
spread_disloc_spike_ratio=2.5      # spread must be Nx median to qualify
spread_disloc_tp=0.30              # $ gold target on snap-back
spread_disloc_sl=0.15              # $ gold stop
spread_disloc_cooldown_sec=15      # min gap between dislocation entries
event_comp_tp=3.00                 # $ gold target on event break
event_comp_sl=0.80                 # $ gold stop on event break
event_comp_trigger=0.15            # $ breakout trigger (vs $0.35 normal)

