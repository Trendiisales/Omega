# ==============================================================================
# OMEGA — COMMODITIES & INDICES TRADING SYSTEM
# BlackBull FIX — Same connection as ChimeraMetals
# Strategy: Compression Breakout — Research-Validated Parameters
# GUI Port: 7779 (HTTP) / 7780 (WebSocket)
# ==============================================================================

[fix]
host=live-uk-eqx-02.p.c-trader.com
port=5211
trade_port=5212
sender_comp_id=live.blackbull.8077780
target_comp_id=cServer
username=8077780
password=Bowen6feb
heartbeat_interval=30

# ==============================================================================
# TRADING MODE
# SHADOW = Full engine, synthetic fills, no FIX orders sent
# LIVE   = Real FIX orders
# ==============================================================================
[mode]
mode=SHADOW

# ==============================================================================
# PRIMARY TRADING SYMBOLS (BlackBull CFD symbol IDs)
# NOTE: these config keys are informational only — not parsed at runtime.
# Actual subscriptions are hardcoded in OMEGA_SYMS[] in main.cpp.
# ==============================================================================
[symbols]
sym0=US500.F   # S&P 500 futures (BlackBull symbol)
sym1=USTEC.F   # Nasdaq-100 futures (BlackBull symbol)
sym2=USOIL.F   # WTI Crude Oil (BlackBull symbol)
sym3=GOLD.F    # Gold (BlackBull symbol)
sym4=VIX.F     # VIX
sym5=DX.F      # US Dollar Index
sym6=DJ30.F    # Dow Jones
sym7=NAS100    # Nasdaq cash
sym8=NGAS.F    # Natural Gas

# ==============================================================================
# BREAKOUT ENGINE — Updated Parameters
# R:R fixed: was 0.2:1 (TP=0.4 SL=2.0), now 2:1 minimum across all symbols
# Lookback windows increased: was 50/200 (noise), now 300/1500 (real structure)
# Compression tightened: was 0.80, now 0.60 (real compression only)
# Vol threshold raised: was 0.05%, now 0.15% (filters noise signals)
# Hold time reduced: was 1500s (25min), now 240s (4min — breakouts move fast)
# Spread cap tightened: was 0.05%, now 0.02% (avoids bad liquidity entries)
# ==============================================================================
[breakout]
vol_thresh_pct=0.150       # % move required to trigger — raised from 0.05% (noise filter)
tp_pct=1.000               # Take profit 1.0% — R:R baseline (was 0.4%)
sl_pct=0.500               # Stop loss 0.5% — tight, fast cut (was 2.0%)
compression_lookback=300   # Ticks for recent vol window (was 50 — too noisy)
baseline_lookback=1500     # Ticks for baseline vol window (was 200 — too short)
compression_threshold=0.60 # recent_vol < 0.60 * baseline = real compression (was 0.80)
max_hold_sec=240           # 4 min max hold — breakouts resolve fast (was 1500s)

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=1            # One position per primary symbol at a time
daily_loss_limit=200.0
max_consec_losses=3
loss_pause_sec=300
min_entry_gap_sec=180
max_spread_entry_pct=0.02  # Tightened from 0.05% — avoid wide spread entries
max_latency_ms=10.0        # Co-located VPS, true TestRequest RTT <3ms

# ==============================================================================
# SESSION FILTER (UTC hours)
# ==============================================================================
[session]
session_start_utc=7
session_end_utc=21
session_asia=true          # enables 22:00-05:00 UTC window for gold/Asia

# ==============================================================================
# SP ENGINE (US500.F) — S&P 500 futures
# ==============================================================================
[sp]
tp_pct=1.000           # 1.0%: SP clean breaks extend 0.8-1.5%
sl_pct=0.500           # 0.5%: above intraday noise, fast cut
vol_thresh_pct=0.150   # 0.15%: real vol spike required
min_gap_sec=300        # 5min gap between signals

# ==============================================================================
# NQ ENGINE (USTEC.F) — Nasdaq-100 futures
# ==============================================================================
[nq]
tp_pct=1.200           # 1.2%: NQ extends further than SP on clean breaks
sl_pct=0.500           # 0.5%: NQ noise slightly higher but cut fast
vol_thresh_pct=0.150   # 0.15%: NQ needs full vol spike
min_gap_sec=240        # 4min gap

# ==============================================================================
# OIL ENGINE (USOIL.F) — WTT Crude Oil
# EIA inventory window (Wed 14:30-15:30 UTC) automatically blocked.
# ==============================================================================
[oil]
tp_pct=1.200           # 1.20%: oil runs 1-2% on clean breakouts
sl_pct=0.600           # 0.60%: above intraday oil noise (0.3-0.5%)
vol_thresh_pct=0.200   # 0.20%: oil needs bigger signal — more noise floor
min_gap_sec=360        # 6min gap

# ==============================================================================
# GOLD ENGINE PARAMETERS
# ==============================================================================
[gold]
gold_tp_pct=0.80           # 0.80% TP — gold at $5200, 0.80% = ~$42 move
gold_sl_pct=0.40           # 0.40% SL — R:R 2:1
gold_vol_thresh_pct=0.15   # 0.15%: raised from 0.04% — filters noise

# ==============================================================================
# TELEMETRY
# ==============================================================================
[telemetry]
gui_port=7779
ws_port=7780
log_file=logs/omega.log
shadow_csv=omega_shadow.csv
