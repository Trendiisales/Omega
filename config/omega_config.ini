# ==============================================================================
# GOLD ENGINE STACK — GoldEngineStack multi-engine orchestrator
# All values here are runtime-configurable. Defaults match the calibrated
# constexpr values from prior commits — no behavioral change on first deploy.
# ==============================================================================
[gold_stack]
# Orchestrator entry gates
hard_sl_cooldown_sec=60         # cooldown after any SL hit
side_chop_window_sec=180        # rolling window for side-specific SL counting
side_chop_pause_sec=180         # pause per side when chop detected
same_level_reentry_sec=30       # min seconds before re-entry at same price band
same_level_reentry_band=1.00    # $ band width for same-level detection
min_vwap_dislocation=0.80       # min $ distance from VWAP to enter
max_entry_spread=2.00           # max spread at entry in absolute $
min_entry_gap_sec=45            # min gap between any two entries
# Position manager
max_hold_sec=600                # position timeout
lock_arm_move=0.60              # move before locking BE — was 1.50, trades show $0.60 moves are real
lock_gain=0.20                  # breakeven lock above entry
trail_arm_1=1.20                # move to arm first trail — was 2.50, too far
trail_dist_1=0.50               # first trail distance
trail_arm_2=2.50                # move to arm tight trail — was 5.00
trail_dist_2=0.30               # tight trail distance
min_locked_profit=0.15          # min profit that must be locked — was 0.30
max_base_sl_ticks=20.0          # SL cap — $2.00, was 30 ($3.00) which never triggered
# LiquiditySweepPro sub-engine
sweep_pro_max_spread=4.00       # max spread to enter sweep trade
sweep_pro_sl_ticks=18           # $1.80 SL (raised 12→18: above spread noise for sweep entries)
sweep_pro_base_size=0.01        # fallback lot — overridden by compute_size() in main
# LiquiditySweepPressure sub-engine (currently DISABLED: 51T 29%WR -$12.10)
sweep_pres_max_spread=4.00
sweep_pres_sl_ticks=10          # $1.00 SL — tighter, pressure entries are earlier in move
sweep_pres_base_size=0.01

# ==============================================================================
# LATENCY EDGE ENGINES — Co-location Speed Advantage (0.3-4ms RTT)
# Three engines running independently from GoldEngineStack and CRTP engines.
#
# GoldSilverLeadLag:
#   Gold moves $0.50 in 10 ticks → arm signal → next XAGUSD tick fires entry
#   if silver hasn't moved $0.008 yet. TP=$0.25 SL=$0.10 Hold=90s Cooldown=30s
#
# GoldSpreadDislocation:
#   Gold spread widens to 2.5x median → fade the spike direction
#   TP=$0.30 SL=$0.15 Hold=30s Cooldown=15s (London/NY sessions only)
#
# GoldEventCompression:
#   Pre-event tight range ($0.40) detected → enter at $0.15 trigger (vs $0.35 normal)
#   Events: Tue/Thu/Fri 12:30 UTC, Wed 18:00 UTC
#   TP=$3.00 SL=$0.80 Hold=300s Cooldown=600s
#
# CompressionBreakout trigger tightened: $0.35 → $0.20 (co-location edge)
# ==============================================================================
[latency_edge]
enabled=true
# GoldSilverLeadLag
lead_lag_gold_signal_move=2.00      # $ gold move in 20 ticks to arm signal
lead_lag_silver_min_reaction=0.05   # silver must not have already moved this $
lead_lag_silver_tp=0.50             # $ silver target
lead_lag_silver_sl=0.25             # $ silver stop
lead_lag_signal_expiry_ms=500       # ms before armed signal expires
lead_lag_max_spread_gold=1.50       # max gold spread when arming
lead_lag_max_spread_silver=0.15     # max silver spread at entry
lead_lag_cooldown_sec=300           # min gap between lead-lag entries
lead_lag_max_hold_sec=60            # max hold — silver follows quickly or not at all
# GoldSpreadDislocation
spread_disloc_spike_ratio=2.5       # spread must be Nx median to qualify
spread_disloc_min_median=0.30       # only active when gold is liquid (spread > $0.30)
spread_disloc_max_median=1.20       # stop trading if normally wide (illiquid session)
spread_disloc_tp=0.30               # $ gold target on snap-back
spread_disloc_sl=0.15               # $ gold stop
spread_disloc_cooldown_sec=60       # min gap between dislocation entries (raised 15→60)
spread_disloc_max_hold_sec=30       # snaps back quickly or not at all
# GoldEventCompression
event_comp_range=0.40               # $ compression range to arm engine pre-event
event_comp_trigger=0.15             # $ breakout trigger (vs $0.35 normal — co-location edge)
event_comp_tp=3.00                  # $ gold target on event break
event_comp_sl=0.80                  # $ gold stop on event break
event_comp_max_hold_sec=300         # event moves need time to develop
event_comp_cooldown_sec=600         # 10 min between event trades
event_comp_max_spread=2.00          # spreads widen pre-event, allow up to $2.00

