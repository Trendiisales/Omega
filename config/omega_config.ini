max_entry_spread=2.00           # max spread at entry in absolute $
min_entry_gap_sec=20            # reduced 45?20: 45s gap kills mid-session flow; CB fires once per box anyway
# Position manager
max_hold_sec=600                # position timeout
lock_arm_move=3.00  # tightened 5.00?3.00: lock BE sooner, less exposure on reversals
                                # leaving only $0.60 upside before BE kill. $1.20 gives breathing room.
lock_gain=1.00      # tightened 0.50?1.00: lock $1 above entry, meaningful profit protection
trail_arm_1=10.00   # EA-matched: trail arms after $10 move                # move to arm first trail -- raised 0.60?2.50: first trail was killing runners
trail_dist_1=2.50   # tightened 5.00?2.50: trail $2.50 behind mid (was $5 -- giving back too much)
trail_arm_2=15.00   # tightened 20.00?15.00: tight trail sooner on confirmed winners
trail_dist_2=1.00   # tightened 2.50?1.00: very tight trail on big winners
min_locked_profit=0.15          # min profit that must be locked -- was 0.30
max_base_sl_ticks=50            # DATA-CALIBRATED: $5 SL (50 ticks). SL=$5/TP=$10 = $7,057 on 2yr tick data.
                                # 30 ticks places SL at ~the opposite box boundary (correct geometry).
                                # 20 ticks ($2.00) put SL only 0.50pts outside the box boundary --
                                # any retracement back into the range hit it immediately.
# LiquiditySweepPro sub-engine
