# ==============================================================================
# ==============================================================================
# BRACKET ENGINE -- XAUUSD
# Classic breakout bracket: buy stop above recent high, sell stop below recent low.
# Opposite side auto-cancels on first trigger.
#
# Structure lookback: 40 ticks (~5-10s at London tick rate for gold)
# TP: 0.25% = $12.50 on $5000 gold (1.25R vs 0.12% SL = $6)
# SL: inside the range -- sits at the opposite extreme (struct_lo for longs)
# MIN_RANGE: 0.04% = $2.00 min range to arm -- avoids bracketing dead flat tape
# Cooldown after SL: 120s -- prevents re-entering same broken structure
# ==============================================================================
[bracket_gold]
lookback=40
tp_pct=0.250
sl_pct=0.120
min_range_pct=0.015  # raised 0.004->0.015: 0.004% of $4700 = 0.19pt < spread. 0.015% = 0.705pt = 3x spread minimum.
max_range_pct=0.030
max_spread_pct=0.060
min_gap_sec=90
cooldown_sl_sec=120
max_hold_sec=600

# ==============================================================================
# BRACKET ENGINE -- XAGUSD (Silver)
# Same logic as gold bracket but tighter -- silver moves faster in pct terms.
# TP: 0.20% = $0.16 on $79 silver
# SL: inside range at opposite extreme
# MIN_RANGE: 0.035% = $0.028 min range to arm
# Only trades during London/NY (07:00-22:00 UTC) per session gate in main.cpp
# ==============================================================================
[bracket_xag]
lookback=40
tp_pct=0.400  # raised 0.200->0.400: old RR was 0.73:1 (negative). Silver engine disabled anyway (Sharpe=-16.23).
sl_pct=0.060  # tightened 0.100->0.060: tighter SL = better RR if silver ever re-enabled
min_range_pct=0.080  # raised 0.035->0.080: was 0.028pt at $79 = sub-spread. 0.080% = 0.063pt minimum.
max_spread_pct=0.050
min_gap_sec=90
cooldown_sl_sec=120
max_hold_sec=900

