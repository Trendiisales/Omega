# ==============================================================================
# BREAKOUT ENGINE
# TP=1.2% SL=0.4% → R:R = 3:1
# Trailing stop activates at 0.60% move (lock BE), 1.00% (trail 0.40%), 1.60% (trail 0.25%)
# BREAKOUT_WATCH extended to 40 ticks — slow breakouts no longer expire in 1.5s
# Vol gate fixed — allows entry when vol >= 60% of baseline (breakout onset)
# Scratch threshold raised 0.12% → 0.20% — above normal tick noise
# ==============================================================================
[breakout]
vol_thresh_pct=0.050       # realistic baseline for index/gold tick-vol environment
tp_pct=1.200               # 1.2%: let winners run (trail protects profit)
sl_pct=0.400               # 0.4%: fast cut, R:R = 3:1
compression_lookback=200   # informational — constructors use per-instrument values
baseline_lookback=1000     # informational — constructors use per-instrument values
compression_threshold=0.70 # informational — constructors use per-instrument values
max_hold_sec=600           # 10 min max hold (was 3 min — was killing winners)
momentum_threshold=0.025   # directional momentum required at breakout
min_breakout_move_pct=0.12 # minimum move from compression edge before entry
max_trades_per_minute=8    # rate limiter per symbol per 60s window

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=8
daily_loss_limit=1000000.0
max_consec_losses=10       # was 50 (meaningless), 10 is still lenient but real
loss_pause_sec=60          # was 10s (too short), 60s is a meaningful cooldown
independent_symbols=true
enable_extended_symbols=true
enable_shadow_signal_audit=true
auto_disable_after_trades=200
shadow_ustec_pilot_only=false
shadow_research_mode=false
min_entry_gap_sec=30       # was 150 (dead field, now wired) — floor gap across all symbols
max_spread_entry_pct=0.04
max_latency_ms=60.0
# NOTE: momentum_threshold removed from [risk] — [breakout] value wins (0.025)
# Having it in both sections caused 0.012 to silently override 0.025
min_breakout_move_pct=0.12

