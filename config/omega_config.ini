# ==============================================================================
# BREAKOUT ENGINE
# TP=1.2% SL=0.4% ? R:R = 3:1
# NOTE: momentum_threshold and min_breakout_move_pct in this section are
# DEFAULTS ONLY. Each engine has its own per-instrument values set in its
# constructor, which are NOT overridden by apply_engine_config.
# Per-instrument values (set in SymbolEngines.hpp constructors):
#   SP    (US500 ~6600):  momentum=0.012% ($0.79),  min_break=0.12% ($7.92)
#   NQ    (USTEC ~24500): momentum=0.010% ($2.45),  min_break=0.08% ($19.60)
#   NAS100(~24500):       momentum=0.010% ($2.45),  min_break=0.08% ($19.60)
#   DJ30  (~46700):       momentum=0.006% ($2.80),  min_break=0.04% ($18.68)
#   Oil   (~$100):        momentum=0.015% ($0.015), min_break=0.10% ($0.10)
#   EU indices:           momentum=0.010%,           min_break=0.06%
#   Silver (~$79):        momentum=0.012%,           min_break=0.08%
# ==============================================================================
[breakout]
vol_thresh_pct=0.050
tp_pct=1.200
sl_pct=0.400
compression_lookback=20
baseline_lookback=80
compression_threshold=0.70
max_hold_sec=600
momentum_threshold=0.025   # default only -- per-instrument values in constructors
min_breakout_move_pct=0.12 # default only -- per-instrument values in constructors
max_trades_per_minute=4    # reduced from 8: 8/min = 480/hr, far too many for a compression system
max_trades_per_cycle=2     # ranking window: allow up to 2 candidates per cycle (was 1)

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=8                    # raised 4?8: with 15 symbols running, 4 was too tight;
                                   # each filled position is tiny (0.01-0.10 lots) so risk is not additive
# true = restore today's closed trades into ledger on restart (correct daily stats, correct daily loss cap)
# false = clean PnL slate -- do NOT use: daily loss cap resets on every crash, risk of double-loss
reload_trades_on_startup=true
daily_loss_limit=2000.0            # raised 450->2000: $450 would cut a 0.40 lot crash trade
                                   # mid-ride (1 SL = $400). $2000 allows full crash capture.
                                   # Downside still protected by: per-trade $80 risk, ATR SL,
                                   # engine cull after 4 SL_HITs, max_lot_gold=0.50 hard cap.
daily_profit_target=5000.0         # USD -- raised for testing to allow big trending days to run fully.
max_loss_per_trade_usd=80.0        # USD -- lowered 150->80: $150 was allowing oversized positions; $80 cap tightens risk control
session_watermark_pct=0.0         # DISABLED -- watermark fires on stale reloaded PnL and blocks entire session.
                                   # Daily loss cap ($450) is the correct hard stop. Watermark adds no value
                                   # when reload_trades_on_startup=false (clean slate on restart).
hourly_loss_limit=200.0            # USD -- ~1.5x single trade risk. Was $50 (sub-trade, blocked after first SL hit).
max_consec_losses=4        # was 10 -- pause after 4 consecutive losses, not 10
loss_pause_sec=60          # was 10s (too short), 60s is a meaningful cooldown
independent_symbols=true
enable_extended_symbols=true
enable_shadow_signal_audit=true
auto_disable_after_trades=200
shadow_ustec_pilot_only=false
shadow_research_mode=true
min_entry_gap_sec=30       # was 150 (dead field, now wired) -- floor gap across all symbols
max_spread_entry_pct=0.15      # global spread governor counter threshold -- per-engine MAX_SPREAD_PCT does actual blocking
max_latency_ms=120.0    # VPS RTT p95 ~68ms -- 60 blocked every live trade; 120 gives headroom
# NOTE: momentum_threshold removed from [risk] -- [breakout] value wins (0.025)
# Having it in both sections caused 0.012 to silently override 0.025
min_breakout_move_pct=0.12

# ==============================================================================
# RISK-BASED POSITION SIZING
# ==============================================================================
# risk_per_trade_usd: maximum dollar loss per trade if SL is hit.
# Lot size is computed dynamically at entry:
#   size = risk_per_trade_usd / (sl_distance_pts + spread_pts) / tick_value_per_lot
#
# Set to 0.0 to disable and use fixed fallback size (0.01 lots -- safe minimum).
#
# WHAT YOU RISK AND WIN AT EACH LEVEL (examples at typical SL distances):
#
#   USOIL.F  SL=0.478pts ($95.54 ? 0.5%):
#     risk= 50 ? size=0.10 lots ? max loss=$48  | TP(1.5%)= +$143
#     risk=100 ? size=0.20 lots ? max loss=$96  | TP(1.5%)= +$286
#     risk=200 ? size=0.40 lots ? max loss=$191 | TP(1.5%)= +$572
#
#   XAGUSD   SL=0.324pts ($81.01 ? 0.4%):
#     risk= 50 ? size=0.03 lots ? max loss=$49  | TP(0.8%)= +$97
#     risk=100 ? size=0.06 lots ? max loss=$97  | TP(0.8%)= +$194
#
#   XAUUSD  SL=10.4pts ($2600 ? 0.4%):
#     risk= 50 ? size=0.05 lots ? max loss=$52  | TP(0.8%)= +$104
#     risk=100 ? size=0.09 lots ? max loss=$94  | TP(0.8%)= +$187
#
#   US500.F  SL=22.3pts ($5570 ? 0.4%):
#     risk= 50 ? size=2.19 lots ? max loss=$49  | TP(1.2%)= +$146
#     risk=100 ? size=4.38 lots ? max loss=$98  | TP(1.2%)= +$293
#
# Per-symbol max_lot caps are a hard safety ceiling -- computed size is
# always clamped DOWN to the cap, never forced UP (that was the old bug).
# ==============================================================================
account_equity=11000.0             # USD -- NZD$18,548 balance at ~0.60 NZDUSD. Used for equity-scaled risk.
risk_per_trade_usd=80.0            # Aligned with max_loss_per_trade_usd=$80. Was $150 but max_loss capped it anyway -- unify so compute_size() and max_loss agree.
                                   # Brute-force on 2yr tick data: SL=$5 TP=$25 5:1 RR = best result.

# Per-symbol hard lot caps -- hard ceiling, compute_size never exceeds these.
max_lot_gold=0.50                  # raised from 0.01: risk sizing now active, 0.50 gives headroom to scale
max_lot_indices=0.10               # Hard cap for all index CFDs. Min trade = 0.1 lots for NAS100/GER40/UK100/ESTX50.
                                   # At $10 risk: US500($50/pt)=0.10lots, USTEC($20/pt)=0.10lots,
                                   # DJ30($5/pt)=0.10lots, NAS100($1/pt)=0.10lots -- cap is correct.
max_lot_oil=0.10                   # Oil at $1000/pt: $10 risk / $478 per lot = 0.02 lots, cap is safe
max_lot_silver=0.10                # Silver at $5000/pt: small risk produces tiny lots, cap is generous
max_lot_fx=0.50                    # FX at $100k/pt: $50 risk on 0.0005 SL = 1.0 lots. Raised from 0.10 (was 10x below computed)
                                    # At $50 risk: EURUSD 5-pip SL = 0.50 lots (cap now allows this)

# Per-symbol minimum lot size.
# If risk calculation produces a smaller lot, it is raised to this floor.
# Set to 0.0 to disable per-symbol floor (falls back to global 0.01 minimum).
# Use case: ensure each trade is tradeable even at very low risk budgets.
min_lot_gold=0.01
min_lot_indices=0.01
min_lot_oil=0.01
min_lot_silver=0.01
min_lot_fx=0.01

# GoldFlow compression vol floor -- hot-reloadable, no reboot needed
# vol_range must exceed this (pts) for GoldFlow entries in COMPRESSION regime.
# Lower = more trades in tight coils. Raise if seeing too many false breaks.
gf_compression_vol_floor=0.8
gf_compression_vol_floor_asia=0.5

