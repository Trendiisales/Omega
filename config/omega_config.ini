#
# As of 2026-04-29 the canonical Omega config lives at:
#
#       ./omega_config.ini   (project root)
#
# This file (./config/omega_config.ini) used to be a second copy that
# silently diverged from the root file -- they disagreed on max_lot_gold,
# max_positions, daily_loss_limit, session_watermark_pct, reload_trades_on_
# startup, indices_enabled, dollar_stop_usd, and bracket_gold min_range_pct.
#
# Whichever file the loader read first (usually the root copy, see
# include/omega_main.hpp:40-46) silently won the race, leading to inconsistent
# behaviour between deploy machines and between sessions on the same machine.
#
# THIS FILE NO LONGER CONTAINS ANY SETTINGS. The loader will still happily
# read it as a valid (empty) INI, in which case every parameter falls back to
# the engine's hard-coded constexpr default. That's intentional: if you ever
# see this file get loaded instead of the root one, the launch log will be
# stripped of all the [risk]/[fix]/etc. settings and the system will refuse
# to enter LIVE because [fix] is missing -- a fail-safe.
#
# DO NOT add settings here. Edit ./omega_config.ini at the project root.
# OmegaHotReload watches that file at 2 s intervals; changes take effect live.
#
# To delete this stub entirely, simply rm this file. The loader's fallback
# (line 46 of include/omega_main.hpp) will then quietly return the root path.
# ==============================================================================

[CONFIG_TOMBSTONE]
