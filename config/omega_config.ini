# ==============================================================================
# BREAKOUT ENGINE
# TP=1.2% SL=0.4% → R:R = 3:1
# vol_thresh=0.20% → filters noise signals
# compression_threshold=0.55 → real tight compression only
# compression_lookback=400, baseline_lookback=2000 → real market structure
# max_hold_sec=180 → 3 min, breakouts resolve fast or they failed
# max_spread_entry_pct=0.02% → clean liquidity only
# ==============================================================================
[breakout]
vol_thresh_pct=0.200       # 0.20%: noise filter — only real vol spikes
tp_pct=1.200               # 1.2%: let winners run
sl_pct=0.400               # 0.4%: fast cut, R:R = 3:1
compression_lookback=400   # ticks for recent vol window
baseline_lookback=2000     # ticks for baseline vol window
compression_threshold=0.55 # recent_vol < 0.55 * baseline = real compression
max_hold_sec=180           # 3 min max hold — breakouts resolve fast

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=1
daily_loss_limit=200.0
max_consec_losses=3
loss_pause_sec=300
min_entry_gap_sec=180
max_spread_entry_pct=0.02  # tight — clean liquidity only
max_latency_ms=10.0
momentum_threshold=0.05     # % price move over last 20 ticks required (LONG>+0.05, SHORT<-0.05)
min_breakout_move_pct=0.25  # breakout from comp edge must be >= 0.25% before entry
max_trades_per_minute=2     # max entries per 60s window per engine

# ==============================================================================
# SESSION FILTER (UTC hours)
# ==============================================================================
[session]
session_start_utc=7
session_end_utc=21
session_asia=true

# ==============================================================================
# SP ENGINE (US500.F)
# ==============================================================================
[sp]
tp_pct=1.200           # 1.2%: SP clean breaks extend 1-1.5%
sl_pct=0.400           # 0.4%: fast cut
vol_thresh_pct=0.200   # 0.20%: real vol spike only
min_gap_sec=300

# ==============================================================================
# NQ ENGINE (USTEC.F)
# ==============================================================================
[nq]
tp_pct=1.200           # 1.2%: NQ extends at least as far as SP
sl_pct=0.400           # 0.4%: fast cut
vol_thresh_pct=0.200   # 0.20%
min_gap_sec=240

# ==============================================================================
# OIL ENGINE (USOIL.F)
# EIA inventory window (Wed 14:30-15:30 UTC) auto-blocked
# ==============================================================================
[oil]
tp_pct=1.500           # 1.5%: oil runs hard on real breakouts
sl_pct=0.500           # 0.5%: above noise floor
vol_thresh_pct=0.200   # 0.20%
min_gap_sec=360

# ==============================================================================
# GOLD ENGINE
# Gold at ~$5200 — 0.80/0.40% = ~$42/$21 move targets
# ==============================================================================
[gold]
gold_tp_pct=0.80
gold_sl_pct=0.40
gold_vol_thresh_pct=0.20   # raised from 0.04% — filters noise

