# ==============================================================================
# BREAKOUT ENGINE
# TP=1.2% SL=0.4% → R:R = 3:1
# compression_threshold=0.70 → relaxed from 0.55 — was blocking all signals
# compression_lookback=200, baseline_lookback=1000 → faster to detect
# min_breakout_move_pct=0.10 → relaxed from 0.25 — was killing all entries
# momentum_threshold=0.02 → relaxed from 0.05 — was blocking momentum gate
# ==============================================================================
[breakout]
vol_thresh_pct=0.050       # realistic baseline for index/gold tick-vol environment
tp_pct=1.200               # 1.2%: let winners run
sl_pct=0.400               # 0.4%: fast cut, R:R = 3:1
compression_lookback=200   # faster compression detection (was 400)
baseline_lookback=1000     # faster baseline (was 2000)
compression_threshold=0.70 # relaxed from 0.55 — was too tight, 0 signals
max_hold_sec=180           # 3 min max hold
momentum_threshold=0.025   # ensure breakout momentum gate is not over-restrictive
min_breakout_move_pct=0.12 # ensure minimum break threshold matches tuned live target
max_trades_per_minute=8

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=8
daily_loss_limit=1000000.0
max_consec_losses=50
loss_pause_sec=10
independent_symbols=true
enable_extended_symbols=true
enable_shadow_signal_audit=true
auto_disable_after_trades=200
shadow_ustec_pilot_only=false
shadow_research_mode=false
min_entry_gap_sec=150
max_spread_entry_pct=0.04  # relaxed from 0.02 — futures spreads can be wider
max_latency_ms=60.0
momentum_threshold=0.012
min_breakout_move_pct=0.06
max_trades_per_minute=8

[extended_ids]
# BlackBull/cTrader requires numeric 55 IDs for market data requests.
# 0 = let Omega learn the ID from the Trade-session SecurityList at runtime.
