# ==============================================================================
# SESSION FILTER (UTC hours)
#
# TWO WINDOWS control when engines are allowed to trade:
#
# PRIMARY WINDOW: session_start_utc ? session_end_utc
#   Covers London open through NY close + 1hr buffer
#   07:00-22:00 UTC
#
# ASIA WINDOW: session_asia=true (hardcoded 22:00-05:00 UTC)
#   Tokyo gold market + NZ/AU morning session
#   Active for gold, silver, oil, forex
#
# FULL COVERAGE MAP:
#   00:00-05:00  Asia window    ? trading
#   05:00-07:00  DEAD ZONE      ? blocked  (Sydney close ? London open, genuinely thin)
#   07:00-22:00  Primary window ? trading
#   22:00-24:00  Asia window    ? trading
#
# IMPORTANT: session_end_utc=22 (not 21)
#   21 created a silent 1-hour dead zone every night (21:00-22:00 UTC)
#   where gold, oil, silver and forex were all blocked despite being open.
#   22 closes the gap -- primary hands off directly to Asia with no break.
# ==============================================================================
[session]
session_start_utc=0  # 24h -- dead zone removed, gold trades around the clock
session_end_utc=0    # start==end means 24h mode
session_asia=true
asia_fx_asia_only=false

