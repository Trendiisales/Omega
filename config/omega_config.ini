# ==============================================================================
# OMEGA — COMMODITIES & INDICES TRADING SYSTEM
# BlackBull FIX — Same connection as ChimeraMetals
# Strategy: Compression Breakout — Research-Validated Parameters
# GUI Port: 7779 (HTTP) / 7780 (WebSocket)
# ==============================================================================

[fix]
host=live-uk-eqx-02.p.c-trader.com
port=5211
trade_port=5212
sender_comp_id=live.blackbull.8077780
target_comp_id=cServer
username=8077780
password=Bowen6feb
heartbeat_interval=30

# ==============================================================================
# TRADING MODE
# SHADOW = Full engine, synthetic fills, no FIX orders sent
# LIVE   = Real FIX orders
# ==============================================================================
[mode]
mode=SHADOW

# ==============================================================================
# PRIMARY TRADING SYMBOLS (BlackBull CFD symbol IDs)
# These IDs are looked up at runtime from the security list response.
# Names here must match exactly what BlackBull returns in tag 55.
# ==============================================================================
[symbols]
# Primary — trade these
sym0=MES       # Micro E-mini S&P 500
sym1=MNQ       # Micro E-mini Nasdaq-100
sym2=MCL       # Micro WTI Crude Oil
# Confirmation — subscribe but don't trade
sym3=ES        # E-mini S&P 500
sym4=NQ        # E-mini Nasdaq-100
sym5=CL        # WTI Crude Oil
sym6=VIX       # CBOE Volatility Index
sym7=DX        # US Dollar Index
sym8=ZN        # 10yr Treasury
sym9=YM        # Dow Jones futures
sym10=RTY      # Russell 2000

# ==============================================================================
# BREAKOUT ENGINE — Research-Validated Parameters
# Based on 4-year tick analysis. Percentage-based = price-regime invariant.
# ==============================================================================
[breakout]
vol_thresh_pct=0.050       # % move required to trigger breakout signal
tp_pct=0.400               # Take profit as % of entry price
sl_pct=2.000               # Stop loss as % of entry price (wide — 96.2% win rate)
compression_lookback=50    # Ticks for recent volatility window
baseline_lookback=200      # Ticks for baseline volatility window
compression_threshold=0.80 # recent_vol < 0.80 * baseline_vol = compression
max_hold_sec=1500          # 25 min max hold — never timeout-killed like old system

# ==============================================================================
# RISK
# ==============================================================================
[risk]
max_positions=1            # One position per primary symbol at a time
daily_loss_limit=200.0
max_consec_losses=3
loss_pause_sec=300
min_entry_gap_sec=180
max_spread_entry_pct=0.05  # Max spread as % of price before blocking entry
max_latency_ms=10.0     ; RTT avg 3.4ms, rarely above 5ms. Gate uses p95 over 200 samples -- jitter-resistant. 10ms is correct strict cap.

# ==============================================================================
# SESSION FILTER (UTC hours)
# London + NY overlap — best liquidity for indices
# Asia session enabled for gold (Tokyo is 3rd largest gold market)
# NZ 12pm = UTC 00:00 = Asia session active
# ==============================================================================
[session]
session_start_utc=7
session_end_utc=21
session_asia=true          # enables 22:00-05:00 UTC window for gold/Asia

# ==============================================================================
# SP ENGINE (US500.F) — S&P 500 futures
# Most liquid index. Tighter compression threshold, better TP:SL than generic.
# Regime-gated: ES/NQ divergence > 0.15% blocks entry. VIX > 35 blocks all.
# Cross-symbol: if NQ already has a position open, SP entry is blocked.
# ==============================================================================
[sp]
tp_pct=0.600           # 0.60%: clean SP breaks extend 0.5-0.8%
sl_pct=0.350           # 0.35%: above intraday noise (0.15-0.20%), cuts fast
vol_thresh_pct=0.040   # 0.04%: tighter than default — SP compression is real
min_gap_sec=300        # 5min gap between signals

# ==============================================================================
# NQ ENGINE (USTEC.F) — Nasdaq-100 futures
# Higher beta than SP. Extends further, slightly wider SL needed.
# Regime-gated: same ES/NQ divergence + panic VIX blocks.
# Cross-symbol: if SP already has a position open, NQ entry is blocked.
# ==============================================================================
[nq]
tp_pct=0.700           # 0.70%: NQ extends further than SP on clean breaks
sl_pct=0.400           # 0.40%: NQ tick noise slightly higher than SP
vol_thresh_pct=0.050   # 0.05%: NQ needs a full vol spike to confirm
min_gap_sec=240        # 4min gap

# ==============================================================================
# OIL ENGINE (USOIL.F) — WTI Crude Oil
# Fundamentally different: supply/demand driven, 1-2% typical daily range.
# EIA inventory window (Wed 14:30-15:30 UTC) automatically blocked.
# Wider TP:SL ratio: oil runs far, but needs room past noise floor.
# ==============================================================================
[oil]
tp_pct=1.200           # 1.20%: oil runs 1-2% on clean breakouts
sl_pct=0.600           # 0.60%: above intraday oil noise (0.3-0.5%)
vol_thresh_pct=0.080   # 0.08%: oil needs a bigger initial signal to confirm
min_gap_sec=360        # 6min gap: oil can multi-spike on same news event

# ==============================================================================
# GOLD ENGINE PARAMETERS (XAU — overrides breakout defaults)
# Tighter than oil/indices — gold moves are decisive, fewer false breaks
# ==============================================================================
[gold]
gold_tp_pct=0.30           # 0.30% TP — ~$9 on $3000 gold
gold_sl_pct=0.15           # 0.15% SL — tight, gold's edge is decisive moves
gold_vol_thresh_pct=0.04   # lower trigger than oil (0.05%) — gold less volatile

# ==============================================================================
# TELEMETRY
# ==============================================================================
[telemetry]
gui_port=7779
ws_port=7780
log_file=logs/omega.log
shadow_csv=omega_shadow.csv
