# ==============================================================================
# BREAKOUT ENGINE
# TP=1.2% SL=0.4% → R:R = 3:1
# NOTE: momentum_threshold and min_breakout_move_pct in this section are
# DEFAULTS ONLY. Each engine has its own per-instrument values set in its
# constructor, which are NOT overridden by apply_engine_config.
# Per-instrument values (set in SymbolEngines.hpp constructors):
#   SP    (US500 ~6600):  momentum=0.012% ($0.79),  min_break=0.12% ($7.92)
#   NQ    (USTEC ~24500): momentum=0.010% ($2.45),  min_break=0.08% ($19.60)
#   NAS100(~24500):       momentum=0.010% ($2.45),  min_break=0.08% ($19.60)
#   DJ30  (~46700):       momentum=0.006% ($2.80),  min_break=0.04% ($18.68)
#   Oil   (~$100):        momentum=0.015% ($0.015), min_break=0.10% ($0.10)
#   EU indices:           momentum=0.010%,           min_break=0.06%
#   Silver (~$79):        momentum=0.012%,           min_break=0.08%
# ==============================================================================
[breakout]
vol_thresh_pct=0.050
tp_pct=1.200
sl_pct=0.400
compression_lookback=200
baseline_lookback=1000
compression_threshold=0.70
max_hold_sec=600
momentum_threshold=0.025   # default only — per-instrument values in constructors
min_breakout_move_pct=0.12 # default only — per-instrument values in constructors
max_trades_per_minute=8

