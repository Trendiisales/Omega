; ============================================================
; symbols.ini — per-symbol engine parameters
; Loaded at startup. All values override compiled-in defaults.
;
; Keys:
;   MIN_RANGE        — minimum structural range to arm (price pts, bracket only)
;   CONFIRM_OFFSET   — follow-through required after breakout (breakout only)
;   MIN_STRUCTURE_MS — min time range must hold before arming (ms, bracket only)
;   BREAKOUT_FAIL_MS — window to detect false breakout post-fill (ms)
;   MIN_HOLD_MS      — min hold before SL/TP evaluated (ms)
;   MAX_HOLD_SEC     — per-symbol max hold in seconds
;   TP_MULT          — TP as multiple of SL distance
;   SL_MULT          — SL scaling multiplier (1.0 = no change)
;   MAX_SPREAD       — max entry spread in absolute price points
;   MIN_EDGE_BP      — minimum TP distance in basis points (0 = disabled)
; ============================================================

; ── METALS ───────────────────────────────────────────────────────────────────

[GOLD.F]
; Gold moves fast — tight hold, strong confirmation required
MIN_RANGE        = 2.80
CONFIRM_OFFSET   = 0.50
MIN_STRUCTURE_MS = 30000
BREAKOUT_FAIL_MS = 5000
MIN_HOLD_MS      = 12000
MAX_HOLD_SEC     = 120
TP_MULT          = 1.60
SL_MULT          = 1.00
MAX_SPREAD       = 0.60
MIN_EDGE_BP      = 12

[XAGUSD]
; Silver more volatile and erratic than gold
MIN_RANGE        = 0.20
CONFIRM_OFFSET   = 0.06
MIN_STRUCTURE_MS = 20000
