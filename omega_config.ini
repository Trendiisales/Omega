# ==============================================================================
# RISK-BASED POSITION SIZING
# ------------------------------------------------------------------------------
# risk_per_trade_usd: maximum dollar loss per trade if SL is hit.
# Lot size is computed dynamically at entry:
#   size = risk_per_trade_usd / (sl_distance_pts + spread_pts) / tick_value_per_lot
#
# Per-symbol max_lot caps are a hard safety ceiling -- computed size is
# always clamped DOWN to the cap, never forced UP.
# ==============================================================================
account_equity=11000.0
# S-2026-06-19 Phase 1: base risk R = 0.375% of equity = $41.25 (operator-set).
# Was 80.0 (0.727% — hotter than the 0.25-0.50% target). compute_size scales
# this by live equity: risk_usd = live_eq * (risk_per_trade_usd / account_equity).
risk_per_trade_usd=41.25

# Per-symbol hard lot caps (audit-tightened).
# 2026-05-08 DEEPSTRIKE: lot tightened 0.05 -> 0.03 to match
# GoldMicroScalperEngine LIVE_LOT for the single-engine live deploy on
# account 8077780. The 0.05 cap was for the deferred lot bump while phantom-
