# ==============================================================================
# TREND-RIDER PORTFOLIO -- Tier-4 ship 6 cells targeting sustained moves (2026-04-30)
# ------------------------------------------------------------------------------
# H2 long+short, H4 long+short, H6 long, D1 long.
# Source of design: distilled from TrendPullbackEngine logic (the engine that
# caught the 2026-03-27 +$3,157 GOLD.F LONG hold-the-trend trade).
#
# Algorithm:
#   Entry:  40-bar Donchian breakout (close > prior 40-bar HIGH for LONG, etc.)
#   SL:     1.5 * ATR14_at_signal (initial)
#   Trail:  STAGED -- loosens as profit grows
#       Stage 1 (MFE >= 2*ATR):  trail at 1.5*ATR behind peak
#       Stage 2 (MFE >= 5*ATR):  trail at 2.5*ATR
#       Stage 3 (MFE >= 10*ATR): trail at 3.5*ATR
#   NO fixed TP. NO time exit. Only trail/SL closes the trade.
#
# Validation: 184 trades/yr, pf 2.0, +$19,633/yr at 0.05 lot baseline. The
# 2026-03-19 / 2026-03-20 / 2026-01-28 spike events all caught with
# +148-296pt single-trade winners.
#
# CONVICTION-TIERED SIZING -- Option B (~1/8 Kelly): risk_pct=0.040 +
# max_lot_cap=0.50 (8x other engines). Backtest pf 1.81-6.46 vs tsmom's
# 1.35-1.66. Per-cell full-Kelly fractions average 44% across the 6 cells;
# practitioner standard is 1/4 to 1/8 Kelly. Worst-case 6-cell simultaneous
# initial-SL = ~24% portfolio drawdown -- recoverable, well clear of
# margin_call (10% of equity). Projects ~$90K/yr at 1-year backtest.
# ==============================================================================
[trend_rider]
enabled=true
shadow_mode=true
max_concurrent=6
risk_pct=0.040
start_equity=10000.0
margin_call=1000.0
# Hard ceiling per single-cell entry.
# 2026-05-08 AUDIT-FIX (S15 P0-3): tightened from 0.50 to 0.20 pending live
#   validation. The original 0.50 cap is 8x other Tier-1 engines and
#   premised on backtest worst-case 6-cell simultaneous-SL ≈ 24% drawdown.
#   Engine ships with zero closed shadow trades to ground-truth that number.
#   Tightening to 0.20 caps worst-case to ~10% while preserving Sharpe
#   (risk_pct unchanged at 0.040). Mirrors the Tsmom 0.05→0.02 tightening
#   above. Relax to 0.50 only after the first 50 closed shadow trades
#   broadly match backtest WR/PF distribution.
max_lot_cap=0.20
block_on_risk_off=true
warmup_csv=phase1/signal_discovery/tsmom_warmup_H1.csv
period=40
sl_n=1.5
stage1_arm_n=2.0
stage1_dist_n=1.5
stage2_arm_n=5.0
stage2_dist_n=2.5
stage3_arm_n=10.0
stage3_dist_n=3.5
