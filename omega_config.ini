# raised 0.03 -> 0.20, then 0.20 -> 0.30. Per-trade $ exposure scaled 10x
# vs original 0.03 deploy; orphan-pair bleed at 0.30 cost approx NZ$310 net
# across two incidents. 2026-05-09 OPERATOR REDUCTION: max_lot_gold
# dropped 0.30 -> 0.01 to cap per-trade exposure at the broker minimum
# while the hedging-mode close path is properly debugged on a demo
# account before any further live deploys. At 0.01 lot, even worst-case
# orphan-pair bleed is sub-dollar per pair instead of $5-15.
# 2026-05-26 S38c: bump 0.01 -> 0.03 for GoldScalpPyramid shadow-to-live
# tier-1 promotion. Engine validated across 2yr backtest with ADX 10
# chop filter (24% DD reduction at 0% PnL cost). 0.03 = 3x prior cap;
# orphan-pair worst-case bleed scales to ~$15-45 per pair. Acceptable
# given the engine's broker-reconciliation guards + RiskMonitor auto-pin.
max_lot_gold=0.03
max_lot_indices=0.10
max_lot_oil=0.10
max_lot_fx=0.50

