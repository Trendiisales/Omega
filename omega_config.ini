# ==============================================================================
# RISK -- AUDIT-TIGHTENED 2026-04-29
# ==============================================================================
[risk]
# GoldFlow -- must be in [risk] section to be parsed by engine_config.hpp
goldflow_enabled=true

# Concurrent-position cap. The Apr 15 phantom burst opened 61 simultaneous
# MacroCrash positions in 41 seconds. With max_positions=3 the storm would
# have stalled at the 4th entry attempt regardless of any per-engine bug.
max_positions=3

# RELOAD-ON-RESTART = false. Audit Apr-29 finding: enabling reload caused at
# least one HBG trade record to traverse trade_lifecycle twice and emit a
# 100x-inflated -$3,008 loss. Disabled until the lifecycle path is hardened
# to detect already-applied tick-multiplier (see fix C-3 in audit report).
# 2026-06-09 RE-ENABLED: root double-multiply fixed in 028e03d0 (engines emit RAW
#   pts*lot; ledger applies the multiplier once). Verified the reload path is safe:
#   it calls g_omegaLedger.record() DIRECTLY (bypasses handle_closed_trade where the
#   double-apply lived) and record() does NOT multiply + dedups replays. Today's CSV
#   is written by the post-fix binary -> correct net_pnl. Restores session P&L continuity.
reload_trades_on_startup=true

# Daily loss cap. 2026-05-26 operator tightened 1500 -> 200 after 21-trade
# chop-day session bled ~$130 net while none of the prior $1500/sec-watermark
# guards tripped (account equity ~$1900, $1500 cap = 79% — absurd ceiling).
# $200 = ~10% of equity; auto-stops after ~8 typical $13 LOSS_CUTs. Pairs
# with hourly_loss_limit=100 (50% of daily) so half-day blow-out also caught.
# S-2026-06-19 Phase 1 R-HIERARCHY (operator: 0.375%/$11k -> R=$41.25).
# All loss limits below are now multiples of base risk R (=risk_per_trade_usd):
#   per-trade 1R+cost=$45 | daily 3R=$124 | hourly 1.5R=$62 |
#   weekly 7R=$289 | per-symbol 2R=$82.
# Prior flat-$ values (daily 200 / hourly 100 / per-trade 50) predate the
# $11k equity base and were ~4.8R/2.4R/1.2R -- inconsistent. 3R daily is the
# tighter, R-consistent ceiling. See outputs handoff item 1.
daily_loss_limit=124.0
daily_profit_target=5000.0
max_loss_per_trade_usd=45.0     # 1R+cost. Was 50 (match dollar_stop_usd below).

# Dollar-stop -- emergency runtime cut. Any position with unrealised loss
# > dollar_stop_usd is closed immediately (checked every 250 ms in
# include/on_tick.hpp). Independent of the engine's own SL.
# Set 0 to disable.
dollar_stop_usd=45.0     # S-2026-06-19 Phase 1: 1R+cost. Was 50.

# Session watermark: cut session if peak-to-trough drawdown exceeds this
# fraction of daily_loss_limit. 0.30 * 1500 = $450 trough triggers stop.
session_watermark_pct=0.30

hourly_loss_limit=62.0       # S-2026-06-19 Phase 1: 1.5R (50% of daily 3R). Was 100.
weekly_loss_limit=289.0      # S-2026-06-19 Phase 1: 7R rolling-7day account halt (NEW). 0=disable.
per_symbol_loss_limit=82.0   # S-2026-06-19 Phase 1: 2R per-symbol daily cap (NEW). 0=disable.

# S-2026-06-19 Phase 1 item 2: correlation-aware PortfolioGovernor.
# Cross-symbol campaign cap on top of the per-symbol single-campaign rule.
# max_total_campaigns = global distinct-symbol cap; max_per_corr_group = 1
# correlated index/equity campaign (NAS100/US500/USTEC/DJ30 = one US_EQUITY
# group; GER40/UK100/ESTX50 = EU_EQUITY; XAU/XAG = METALS; oil; FX-USD).
portfolio_governor_enabled=true
governor_max_total_campaigns=2
governor_max_per_corr_group=1
max_consec_losses=3          # Was 4. Pause earlier on losing streaks.
loss_pause_sec=180           # Was 60s. 3-min cool-off > 1-min.
independent_symbols=true
enable_extended_symbols=true
indices_enabled=true         # Indices are net-flat in audit window; safe to leave on.
enable_shadow_signal_audit=true
auto_disable_after_trades=200
shadow_ustec_pilot_only=false
shadow_research_mode=true

# Floor gap across all symbols/engines. Tightened 30 -> 90.
# This setting alone would have stopped the Apr-15 burst at trade #2.
min_entry_gap_sec=90

max_spread_entry_pct=0.15
max_latency_ms=120.0
