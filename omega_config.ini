# CONSOLIDATION NOTE -- 2026-04-29 audit
# --------------------------------------
# Prior to 2026-04-29 the repo carried TWO copies of this file:
#   ./omega_config.ini          (this file -- root, the loader's first choice)
#   ./config/omega_config.ini   (now demoted to a deprecation stub)
#
# The loader in include/omega_main.hpp resolves config in this order:
#   1. explicit argv[1]
#   2. ./omega_config.ini   (this file)
#   3. ./config/omega_config.ini
#
# To "sort the divergence forever", this root file is now THE canonical config
# and ./config/omega_config.ini has been replaced with a header-only tombstone
# so that even if the loader fell through to it, no settings would silently
# override these. If you ever see [CONFIG-TOMBSTONE] in the launch log, the
# wrong file got loaded -- fix the working directory.
#
# AUDIT-TIGHTENED RISK PARAMETERS (S58 2026-04-29)
# ------------------------------------------------
# After the Apr-15 MacroCrash phantom-fire incident (61 entries / 41 sec /
# -$9,907 loss) the following risk values were tightened. All are reversible
# and hot-reloadable (OmegaHotReload watches this file every 2 s).
#   max_positions:        3      (was 3 root / 8 config)
#   daily_loss_limit:     1500   (was 2000 root / 5000 config)
#   hourly_loss_limit:    150    (was 200)
#   max_consec_losses:    3      (was 4)
#   loss_pause_sec:       180    (was 60)
#   min_entry_gap_sec:    90     (was 30)
#   max_lot_gold:         0.05   (was 0.10 root / 0.50 config)
#   session_watermark_pct: 0.30  (was 0.0 root / 0.27 config)
#   dollar_stop_usd:      50.0   (kept; was missing in config/ copy)
#   bracket_gold min_range_pct: 0.015 (was 0.004 root -- 0.19pt, below spread)
# ==============================================================================

