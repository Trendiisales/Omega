# ==============================================================================
# C1_RETUNED PORTFOLIO -- Phase 2 Python winner ported to C++ (2026-04-29)
# ------------------------------------------------------------------------------
# Verdict: phase2/donchian_postregime/CHOSEN.md.
# Backtest: +74.12% / -5.85% max DD / PF 1.486 / Sharpe 2.651 / WR 55.2%.
# Walk-forward TRAIN/VALIDATE/TEST all PASS. Post-regime PF 1.334 -> 1.630.
# Cells (long-only, XAUUSD only):
#   - Donchian H1 long retuned: period=20, sl=3.0 ATR, tp=5.0 ATR
#   - Bollinger H2 long       : touch lower band, exit on midline
#   - Bollinger H4 long       : touch lower band, exit on midline
#   - Bollinger H6 long       : touch lower band, exit on midline
# Portfolio: max_concurrent=4, risk=0.5%, $10k start equity, $1k margin call.
# Halt criteria: max DD <= -7.5%; cluster days (4 cells losing same UTC day)
# >= 1 -> halt flag (manual review). Shadow_mode=true is the only safe default.
# ==============================================================================
[c1_retuned]
enabled=true
shadow_mode=true
max_concurrent=4
risk_pct=0.005
start_equity=10000.0
margin_call=1000.0
# Hard ceiling per single-cell entry. Tighter than backtest 0.10 while we
# accumulate live shadow data; relax to 0.10 once first 100 closed shadow
# trades broadly match backtest WR/PF distribution.
max_lot_cap=0.05
# Donchian H1 cell params (from CHOSEN.md verdict).
donchian_h1_period=20
donchian_h1_sl_atr=3.0
donchian_h1_tp_atr=5.0
donchian_h1_max_hold_bars=30
donchian_h1_max_spread=1.0
# Bollinger long cell params (shared across H2/H4/H6).
bollinger_hard_sl_atr=1.5
bollinger_max_hold_bars=20
bollinger_max_spread=1.5

# ==============================================================================
# TSMOM PORTFOLIO -- Tier-1 ship of 5 long tsmom cells (2026-04-30)
# ------------------------------------------------------------------------------
# Verdict source:
#   phase1/signal_discovery/POST_CUT_FULL_REPORT.md
#   phase1/signal_discovery/post_cut_revalidate_all.py (sig_tsmom + sim_c)
# Post-cut sim_c (1 unit, 365 days, costs included):
#   tsmom H1 long: 3,484 trades, 53.2% WR, +$17,482, $5.02/trade,  pf 1.39
#   tsmom H2 long: 1,826 trades, 55.1% WR, +$12,952, $7.09/trade,  pf 1.35
#   tsmom H4 long:   933 trades, 61.4% WR, +$15,885, $17.03/trade, pf 1.66
#   tsmom H6 long:   661 trades, 57.8% WR, +$13,380, $20.24/trade, pf 1.65
#   tsmom D1 long:   216 trades, 56.5% WR,  +$9,109, $42.17/trade, pf 1.65
# = 82% of the 27-cell master_summary post-cut survivor set total edge.
# Long-only Tier-1, XAUUSD only, max_concurrent=5, 0.5% risk per trade.
# Cooldown=hold_bars=12 prevents position stacking (per SESSION_HANDOFF
# 2026-04-29 caveat: the simple "ret_n > 0" signal in post_cut_revalidate_all.py
# fires ~4x more often than the master_summary canonical pipeline; cooldown
# matches that pipeline's anti-stacking behaviour).
# Halt criteria: margin_call=$1,000 (paper equity floor); macro RISK_OFF
# blocks new entries (existing positions still managed by on_tick).
# ==============================================================================
[tsmom]
enabled=true
shadow_mode=true
max_concurrent=5
risk_pct=0.005
start_equity=10000.0
margin_call=1000.0
# Hard ceiling per single-cell entry. Tighter than backtest 0.10 while we
# accumulate live shadow data; relax to 0.10 once first 100 closed shadow
# trades broadly match backtest WR/PF distribution.
max_lot_cap=0.05
# Macro regime gate: when g_macroDetector.regime() == "RISK_OFF", new entries
# are blocked across all 5 cells. Existing positions are still managed by
# on_tick (intrabar SL fills) and on_bar (time exits) in the normal way.
block_on_risk_off=true
# Historical-bar warmup CSV. Generated by:
#   python3 phase1/signal_discovery/export_tsmom_warmup.py
# 6,156 post-cut H1 bars (2025-04-01 -> 2026-04-01). Feeding these through
# the synthesisers/ATRs/closes_ deques at startup makes every cell
# (H1/H2/H4/H6/D1) READY before the first live H1 bar arrives -- no
# cold-start window. Set to empty string to disable warmup (cold start
# fallback; not recommended in production).
warmup_csv=phase1/signal_discovery/tsmom_warmup_H1.csv
# Per-cell tsmom params (shared across H1/H2/H4/H6/D1; long-only Tier-1).
tsmom_lookback=20
tsmom_hold_bars=12
tsmom_hard_sl_atr=3.0
tsmom_cooldown_bars=12
tsmom_max_spread_pt=1.5

# Per-cell sub-sections. Currently documentation-only -- engine_init.hpp
# wires the literal values in the C++ via TsmomPortfolio::init(). Setting
# any cell's enabled=false here will not currently disable that cell at
# runtime; that flip will be wired into a hot-reload path in a follow-up.
